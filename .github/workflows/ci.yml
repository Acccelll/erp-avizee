name: CI

on:
  push:
    branches:
      - main
      - develop
      - feat
      - fix
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'src/**'
      - 'tests/e2e/**'
      - 'supabase/**'
      - '.github/workflows/ci.yml'

# Cancel in-progress runs for the same branch to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── 2. Type-check ─────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  # ── 3. Unit Tests ────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  # ── 4. Build ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-tests]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

  # ── 5. E2E Tests (manual trigger only) ───────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Run E2E only on workflow_dispatch (manual trigger) or when the commit
    # message contains "[e2e]". This avoids consuming Playwright minutes on
    # every push while keeping automated E2E available when needed.
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[e2e]')
    env:
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      BASE_URL: ${{ secrets.E2E_BASE_URL || 'http://localhost:8080' }}
      VITE_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache Playwright browser binaries between runs.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (if cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build project (needed for preview server)
        run: npm run build

      - name: Start preview server and run E2E tests
        run: |
          npx vite preview --port 8080 &
          # Poll until the server is ready (up to 30 s) instead of a fixed sleep.
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080 > /dev/null && break
            sleep 1
          done
          npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14


  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-tests, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release


  e2e-pr:
    name: E2E PR (Supabase)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check secrets availability
        id: check-secrets
        run: |
          if [ -z "${{ secrets.E2E_SUPABASE_URL }}" ] || [ -z "${{ secrets.E2E_SUPABASE_ANON_KEY }}" ]; then
            echo "available=false" >> $GITHUB_OUTPUT
          else
            echo "available=true" >> $GITHUB_OUTPUT
          fi
      - name: Warn when secrets are missing
        if: steps.check-secrets.outputs.available != 'true'
        run: echo "⚠️ Secrets E2E ausentes. Pulando E2E completo sem falhar o build."
      - name: Apply migrations + seed
        if: steps.check-secrets.outputs.available == 'true'
        run: |
          npx supabase db push || true
          npx supabase db seed || true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Start app and run E2E
        if: steps.check-secrets.outputs.available == 'true'
        env:
          VITE_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
        run: |
          npm run dev -- --port 8080 &
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080 > /dev/null && break
            sleep 1
          done
          npm run test:e2e

  e2e-smoke:
    name: E2E Smoke (mocks)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Start app (mock mode) and run critical smoke
        run: |
          npm run dev -- --port 8080 &
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080 > /dev/null && break
            sleep 1
          done
          npx playwright test tests/e2e/fluxo-comercial.spec.ts


  rls-tests:
    name: RLS Tests
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run RLS tests
        run: npx tsx scripts/test-rls.ts
        env:
          RLS_SUPABASE_URL: ${{ secrets.RLS_SUPABASE_URL }}
          RLS_ANON_KEY: ${{ secrets.RLS_ANON_KEY }}
          RLS_SERVICE_ROLE_KEY: ${{ secrets.RLS_SERVICE_ROLE_KEY }}
